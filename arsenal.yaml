# data/arsenal.yaml

scripts:
  ping:
    ram: 1
    damage: 2
    type: "brute_force"
    description: "ICMP echo probe. Your cheapest starter payload: it confirms the host is answering, deals light lane pressure, and leaves a short timing window for a follow-up on the same subsystem."
    dna:
      vectors: ["recon", "network", "service"]
      protocols: ["icmp", "timing"]
      behaviors: ["probe", "timing"]
    allowed_flags: ["--ransom", "--stealth", "--worm", "--burst"]
  masscan:
    ram: 2
    damage: 0
    type: "scan"
    description: "High-speed SYN spray. It trades detail for reach, splashing the host's exposed services into view and priming fast follow-up windows on the lanes it catches."
    dna:
      vectors: ["recon", "network", "service"]
      protocols: ["tcp", "syn"]
      behaviors: ["scan", "fanout", "burst"]
    allowed_flags: ["--stealth", "--ghost"]
    supports_target: false
  nmap:
    ram: 2
    damage: 0
    type: "scan"
    description: "TCP/service scan. Reveals open ports, banners, and the host's subsystem map. Targeted mode performs deeper fingerprinting on one lane and primes later exploit work there."
    dna:
      vectors: ["recon", "fingerprint", "service"]
      protocols: ["tcp", "banner"]
      behaviors: ["scan", "enumerate", "prime"]
    allowed_flags: ["--stealth", "--ghost"]
  enum:
    ram: 3
    damage: 0
    type: "scan"
    description: "Host and service enumeration. Resolves exact telemetry on one subsystem and sharpens your read on the host's next move."
    dna:
      vectors: ["recon", "telemetry", "service"]
      protocols: ["rpc", "banner"]
      behaviors: ["enumerate", "inspect", "reveal"]
    allowed_flags: ["--stealth", "--ghost"]
  whois:
    ram: 1
    damage: 0
    type: "scan"
    description: "Ownership lookup. Pulls registrant and operator clues while lowering the exposure cost of the next recon action."
    dna:
      vectors: ["recon", "identity", "registry"]
      protocols: ["whois", "dns"]
      behaviors: ["lookup", "mask"]
    allowed_flags: ["--stealth", "--ghost"]
    supports_target: false
  dirb:
    ram: 2
    damage: 0
    type: "scan"
    description: "Directory and endpoint brute force. Hunts exposed paths on one subsystem, resolves exact telemetry, and primes later injection work."
    dna:
      vectors: ["recon", "web", "endpoint"]
      protocols: ["http", "https"]
      behaviors: ["enumerate", "brute", "prime"]
    allowed_flags: ["--stealth", "--ghost"]
  airmon-ng:
    ram: 3
    damage: 2
    type: "exploit"
    description: "Monitor-mode pivot. Peels back perimeter controls on [SEC] long enough for deeper fingerprinting and cleaner follow-up pressure."
    dna:
      vectors: ["access", "defense", "wireless"]
      protocols: ["rfmon", "wifi"]
      behaviors: ["pivot", "peel", "disrupt"]
    allowed_flags: ["--stealth"]
    default_target: "SEC"
    disrupt_turns: 2
  hydra:
    ram: 4
    damage: 8
    type: "brute_force"
    description: "Credential brute force. Lands as several rapid login attempts and is strongest on auth-heavy lanes, especially after spray pressure."
    dna:
      vectors: ["access", "credential", "service"]
      protocols: ["ssh", "http", "smb"]
      behaviors: ["brute", "multi_hit", "pressure"]
    allowed_flags: ["--ransom", "--stealth", "--worm", "--burst", "--volatile", "--cascade"]
  ddos:
    ram: 5
    damage: 6
    type: "brute_force"
    description: "Distributed traffic flood. Saturates routing and perimeter lanes, and scales upward with every Botnet Seed you have active across the domain."
    dna:
      vectors: ["network", "saturation", "botnet"]
      protocols: ["tcp", "udp", "http"]
      behaviors: ["flood", "overwhelm", "distributed"]
    allowed_flags: ["--ransom", "--stealth", "--worm", "--burst", "--fork", "--volatile", "--cascade"]
  sqlmap:
    ram: 3
    damage: 5
    type: "exploit"
    description: "Injection framework. Excels against database-backed or web-facing lanes and gets stronger once dirb has already found a path."
    dna:
      vectors: ["injection", "database", "web"]
      protocols: ["http", "sql"]
      behaviors: ["inject", "exploit", "exfil"]
    allowed_flags: ["--ransom", "--stealth", "--worm", "--fork", "--burst", "--volatile", "--cascade"]
  siphon:
    ram: 2
    damage: 3
    type: "exploit"
    description: "Data siphon. Hooks a live service, steals value as it bites, and pays out best on storage, memory, and database-backed lanes."
    dna:
      vectors: ["data", "exfil", "service"]
      protocols: ["http", "sql", "cache"]
      behaviors: ["drain", "persist", "hook"]
    allowed_flags: ["--ransom", "--stealth", "--ghost", "--fork", "--burst", "--cascade"]
  spray:
    ram: 3
    damage: 4
    type: "exploit"
    description: "Password spray. Broad auth pressure that destabilizes login surfaces and primes them for a stronger hydra follow-up."
    dna:
      vectors: ["credential", "auth", "access"]
      protocols: ["http", "ssh", "smb"]
      behaviors: ["spray", "prime", "weaken"]
    allowed_flags: ["--ransom", "--stealth", "--fork", "--burst", "--volatile", "--cascade"]
  shred:
    ram: 3
    damage: 5
    type: "brute_force"
    description: "Destructive wipe routine. Most effective once a subsystem is already unstable and can briefly deny recovery on damaged memory or storage lanes."
    dna:
      vectors: ["destruction", "data", "storage"]
      protocols: ["fs", "io"]
      behaviors: ["wipe", "deny", "corrupt"]
    allowed_flags: ["--ransom", "--stealth", "--burst", "--volatile", "--cascade"]
  overflow:
    ram: 4
    damage: 6
    type: "exploit"
    description: "Memory corruption payload. Performs best on [MEM] and [NET] lanes with exposed services and can jam the host's next action."
    dna:
      vectors: ["memory", "service", "execution"]
      protocols: ["heap", "socket"]
      behaviors: ["corrupt", "jam", "exploit"]
    allowed_flags: ["--ransom", "--stealth", "--fork", "--burst", "--volatile", "--cascade"]
  hammer:
    ram: 5
    damage: 10
    type: "brute_force"
    description: "Custom crash harness. Loud, expensive, and best used after the perimeter is already open. Clean core hits can force a panic spill and stall the host's next move."
    dna:
      vectors: ["kernel", "crash", "system"]
      protocols: ["syscall", "process"]
      behaviors: ["smash", "panic", "stall"]
    allowed_flags: ["--ransom", "--worm", "--burst", "--volatile", "--cascade"]
  spoof:
    ram: 2
    damage: 0
    type: "utility"
    description: "Counter-recon traffic shaping. Corrupts hostile recon already locked on to you and muddies the host's recent behavioral cache."
    dna:
      vectors: ["counterintel", "identity", "network"]
      protocols: ["arp", "dns", "banner"]
      behaviors: ["spoof", "blur", "evade"]
    allowed_flags: []
    supports_target: false
  harden:
    ram: 2
    damage: 0
    type: "utility"
    description: "ACL hardening. Temporarily reinforces one subsystem and pays extra if you correctly predict the incoming lane of attack."
    dna:
      vectors: ["defense", "acl", "subsystem"]
      protocols: ["policy", "firewall"]
      behaviors: ["fortify", "predict", "brace"]
    aliases: ["fortify"]
    allowed_flags: []
    guard: 5
    turns: 1
  honeypot:
    ram: 2
    damage: 0
    type: "utility"
    description: "Decoy surface. The next hostile scan resolves against planted telemetry instead of your real node."
    dna:
      vectors: ["defense", "decoy", "recon"]
      protocols: ["banner", "telemetry"]
      behaviors: ["decoy", "mislead", "bait"]
    aliases: ["jammer"]
    allowed_flags: []
    supports_target: false
  canary:
    ram: 3
    damage: 0
    type: "utility"
    description: "Watchpoint trap. Arm it on one subsystem and it fires back if the host commits to that lane."
    dna:
      vectors: ["defense", "telemetry", "counterintel"]
      protocols: ["watchdog", "syscall"]
      behaviors: ["trap", "alert", "trip"]
    aliases: ["tripwire"]
    allowed_flags: []
    trap_damage: 5
    turns: 1
  sinkhole:
    ram: 3
    damage: 0
    type: "utility"
    description: "Traffic sinkhole. Redirects the next hostile action on one subsystem back into its source."
    dna:
      vectors: ["defense", "network", "redirect"]
      protocols: ["route", "tcp"]
      behaviors: ["reroute", "reflect", "trap"]
    aliases: ["mirror"]
    allowed_flags: []
    turns: 1
    ratio: 1.0
    flat_damage: 2
  rekey:
    ram: 2
    damage: 0
    type: "utility"
    description: "Session-key rotation. Clears RAM-lock residue, peels back hostile recon, and invalidates the host's cached read on your recent behavior."
    dna:
      vectors: ["defense", "session", "identity"]
      protocols: ["tls", "auth"]
      behaviors: ["rotate", "scrub", "reset"]
    aliases: ["purge"]
    allowed_flags: []
    supports_target: false
  patch:
    ram: 2
    damage: 0
    repair: 6
    type: "utility"
    description: "Emergency patch cycle. Restores Core OS integrity, lightly restitches the most damaged supporting lane, and can warm a little RAM back into circulation."
    dna:
      vectors: ["repair", "system", "memory"]
      protocols: ["service", "package"]
      behaviors: ["repair", "restore", "stabilize"]
    allowed_flags: []
    supports_target: false
  jmp:
    ram: 1
    damage: 0
    type: "utility"
    description: "Queue branch shim. Rewrites local execution order by swapping the next two queued payloads, letting you splice a different adjacency pair into place without rebuilding the whole stack."
    dna:
      vectors: ["stack", "scheduler", "control"]
      protocols: ["queue", "branch"]
      behaviors: ["swap", "reroute", "reorder"]
    allowed_flags: []
    supports_target: false
  stager:
    ram: 2
    damage: 0
    type: "utility"
    description: "Deferred detonation loader. Arms a buffer on one subsystem so the next adjacent offensive payload is captured and stored as delayed pressure instead of landing immediately."
    dna:
      vectors: ["stack", "timing", "payload"]
      protocols: ["buffer", "loader"]
      behaviors: ["stage", "hold", "defer"]
    allowed_flags: []
    default_target: "OS"
  buffer:
    ram: 2
    damage: 0
    type: "utility"
    description: "Containment shim. Arms a one-shot buffer on one subsystem so the next adjacent offensive payload stores excess damage instead of dumping all of it into fragile hardware."
    dna:
      vectors: ["stack", "containment", "timing"]
      protocols: ["buffer", "scheduler"]
      behaviors: ["contain", "clamp", "store"]
    allowed_flags: []
    default_target: "OS"

flags:
  --ransom:
    ram: 1
    description: "Extortion wrapper. Turns a clean breach into leverage and squeezes value out of every packet that actually lands."
    dna:
      vectors: ["data", "monetization", "exfil"]
      protocols: ["locker", "payment"]
      behaviors: ["extort", "drain"]
  --stealth:
    ram: 2
    description: "Low-signature wrapper. Smears the traffic pattern and tucks the payload under a quieter route profile."
    dna:
      vectors: ["counterintel", "network", "route"]
      protocols: ["timing", "jitter"]
      behaviors: ["mask", "evade", "quiet"]
    exposure_delta: -15
  --ghost:
    ram: 1
    description: "Light OPSEC sheath. A thinner veil than --stealth, built for quick recon passes that still want a little cover."
    dna:
      vectors: ["counterintel", "recon", "identity"]
      protocols: ["header", "route"]
      behaviors: ["mask", "evade", "light"]
    exposure_delta: -10
  --worm:
    ram: 2
    description: "Self-propagating wrapper. Leaves a live stub in the wreckage and lets the payload crawl into whatever is still exposed."
    dna:
      vectors: ["payload", "propagation", "network"]
      protocols: ["session", "route"]
      behaviors: ["replicate", "spread", "chain"]
  --burst:
    ram: 1
    description: "Burst-fire wrapper. Tightens the strike window and slams the lane all at once, loud enough for everyone on the route to notice."
    dna:
      vectors: ["timing", "payload", "overclock"]
      protocols: ["scheduler", "timing"]
      behaviors: ["burst", "spike", "loud"]
    damage_bonus: 3
    noise_bonus: 20
  --fork:
    ram: 2
    description: "Multi-thread wrapper. Clones the payload thread and lets a second live lane catch the spill."
    dna:
      vectors: ["payload", "concurrency", "fanout"]
      protocols: ["thread", "session"]
      behaviors: ["split", "duplicate", "fanout"]
  --volatile:
    ram: 1
    description: "Unsafe overclock wrapper. Pushes the payload past safe margins and lets the instability hit the target before it hits you."
    dna:
      vectors: ["payload", "overclock", "instability"]
      protocols: ["clock", "memory"]
      behaviors: ["unstable", "splash", "spike"]
    damage_bonus: 2
    noise_bonus: 12
  --cascade:
    ram: 2
    description: "Bus-break wrapper. Trades precision for spillover, forcing more of the payload out across adjacent subsystem buses."
    dna:
      vectors: ["payload", "bus", "spillover"]
      protocols: ["bus", "io"]
      behaviors: ["spill", "chain", "spread"]
