consumables:
  ram_capsule:
    name: "RAM Capsule"
    description: "One-use injector. Adds 4 RAM immediately; any amount above your live cap becomes temporary overflow for the next payload."
    effect: "ram"
    amount: 4
  decoy_shroud:
    name: "Honeypot Seed"
    description: "One-use counterintel veil. Drops hostile recon by one stage and seeds a honeypot."
    effect: "decoy"
    scrub_stages: 1
    jammer_turns: 1
  guard_spike:
    name: "ACL Spike"
    description: "One-use hardening patch. Wraps one subsystem in a 7-point ACL shell for 2 turns."
    effect: "guard"
    amount: 7
    turns: 2
    requires_target: true
  failsafe_patch:
    name: "Failsafe Patch"
    description: "One-use emergency restore. Repairs 10 Core OS and clears RAM lock residue."
    effect: "patch"
    amount: 10
  trap_kit:
    name: "Canary Kit"
    description: "One-use predictive snare. Arms a 6-damage canary callback on one subsystem for 2 turns."
    effect: "tripwire"
    trap_damage: 6
    turns: 2
    requires_target: true

modules:
  vpn_tunnel:
    name: "VPN Tunnel"
    description: "Pins the rooted host into your relay mesh. Lets you fast-travel back to that foothold from anywhere in the current subnet."
    effect: "fast_travel"
  botnet_seed:
    name: "Botnet Seed"
    description: "Turns the rooted host into a traffic zombie. Each seed increases global botnet pressure and scales DDoS output."
    effect: "botnet"
  crypto_miner:
    name: "Crypto Miner"
    description: "Leaves a quiet mining worker on the rooted host. Pays passive Crypto at the start of each new subnet/day."
    effect: "income"
    amount: 18

